name: Sync AI Guide

on:
  push:
    branches:
      - main
    paths:
      - 'content/knowledge/**/*'
      - 'scripts/ingest.mjs'

concurrency:
  group: sync-ai-guide
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get changed documentation files
        id: changed-files
        shell: bash
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep -E '^content/knowledge/.*\.(md|mdx)$' | grep -v '/index\.mdx$' || true)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Show changed files
        run: |
          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.changed_files }}"

      - name: Run ingestion for changed files
        if: steps.changed-files.outputs.changed_files != ''
        shell: bash
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          mapfile -t files <<< "${{ steps.changed-files.outputs.changed_files }}"
          node scripts/ingest.mjs "${files[@]}"

      - name: No eligible files changed
        if: steps.changed-files.outputs.changed_files == ''
        run: echo "No eligible documentation files changed."